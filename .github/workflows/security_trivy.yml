name: Security trivy dependency check
on:
  workflow_dispatch:
  schedule:
    - cron: "11 3 * * MON-FRI" # Every weekday

jobs:
  security-typescript-trivy-check:
    permissions:
      contents: read
      actions: read
      security-events: write
    name: Project security trivy dependency check
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_trivy.yml@607c82f9fa98d1c35286644d7d70f13c50c4316b # v2.13.2
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
    secrets: inherit
