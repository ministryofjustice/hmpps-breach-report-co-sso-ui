  env:
    INGRESS_URL: "https://cosso-ui-preprod.hmpps.service.justice.gov.uk"
    HMPPS_AUTH_URL: "https://sign-in-preprod.hmpps.service.justice.gov.uk/auth"
    TOKEN_VERIFICATION_API_URL: "https://token-verification-api-preprod.prison.service.justice.gov.uk"
    COSSO_API_URL: "https://cosso-api-preprod.hmpps.service.justice.gov.uk"
    PROBATION_ACCESS_CONTROL_URL: "https://probation-access-control-preprod.hmpps.service.justice.gov.uk"
    ENVIRONMENT_NAME: PRE-PRODUCTION
    NDELIUS_INTEGRATION_URL: "https://cosso-and-delius-preprod.hmpps.service.justice.gov.uk"
    NDELIUS_DEEPLINK_URL: "https://ndelius.pre-prod.delius.probation.hmpps.dsd.io//NDelius-war/delius/JSP/deeplink.xhtml"

